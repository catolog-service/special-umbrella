
services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: event-service-db
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: eventuser
      POSTGRES_PASSWORD: eventpassword
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-network

volumes:
  postgres_data:
    driver: local

networks:
  event-network:
    driver: bridge
